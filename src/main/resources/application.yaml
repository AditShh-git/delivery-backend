server:
  port: 8081

spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.delivery: DEBUG          # your package — sees all debug logs
    org.springframework.security: INFO   # security framework — info only
    org.hibernate.SQL: DEBUG     # see SQL queries
    org.hibernate.orm.jdbc.bind: TRACE   # see SQL parameters

  file:
    name: logs/delivery.log

  pattern:
    console: "%clr(%d{HH:mm:ss}){cyan} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{25}){yellow} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: 0NurghFgn5qfCSBz6cGQkTa/Pc1HYHqmWqx+d9OYesujKjjixNpGEgwC+bUlVTaPabjPPWrlzjKRODEyS9ZtA==
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    mappings:
      enabled: true